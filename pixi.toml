[workspace]
authors = ["siquette <rodrigosiquette@gmail.com>"]
channels = ["conda-forge"]
name = "opniao_aegea"
platforms = ["linux-64"]
version = "0.1.0"

[tasks.serve-quarto]
cmd = "quarto serve dashboard_quarto.qmd"
cwd = "quarto_/files"
env = { QUARTO_PYTHON = "../../.pixi/envs/default/bin/python" }

[tasks.serve-obs]
cmd = "npx observable preview"
cwd = "quarto_/files"

[tasks.dashboard]
cmd = "streamlit run stramilit/files/dashboard_final.py"

[dependencies]
streamlit = ">=1.39.0,<2"  # ← CORRIGIDO (era ==1.31.0)
pandas = ">=2.3.3,<3"
plotly = ">=6.6.0,<7"
scipy = ">=1.17.1,<2"
numpy = ">=1.26.4,<2"
matplotlib = ">=3.10.8,<4"
seaborn = ">=0.13.2,<0.14"
ipykernel = ">=7.2.0,<8"
openpyxl = ">=3.1.5,<4"
nbformat = ">=5.10.4,<6"
ipywidgets = ">=8.1.8,<9"
nbconvert = ">=7.17.0,<8"
pandoc = ">=3.9.0.2,<4"
shinywidgets = ">=0.7.1,<0.8"
nodejs = ">=24.10.0,<24.11"
jupyter = ">=1.1.1,<2"

[pypi-dependencies]
shinywidgets = "*"
shiny = ">=0.7.0"
